<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mathOS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="desktop"></div>

    <div id="app-window" class="win-hidden">
        <div class="window-header">
            <div class="header-left">
                <img id="active-window-icon" src="" alt="">
                <span id="active-window-title">App</span>
            </div>
            <div class="header-right">
                <button class="win-control">─</button>
                <button class="win-control">▢</button>
                <button class="win-control close" onclick="closeApp()">✕</button>
            </div>
        </div>
        <div class="window-content">
            <iframe id="app-iframe" src=""></iframe>
        </div>
    </div>

    <div id="taskbar">
        <div class="tb-center">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e0/Windows_11_logo.svg" class="tb-icon" alt="Start">
            <img src="https://img.icons8.com/color/48/search--v1.png" class="tb-icon">
            <img src="https://img.icons8.com/fluency/48/settings.png" class="tb-icon">
            
            <img src="https://img.icons8.com/color/48/chrome.png" class="tb-icon" onclick="openWeb('https://www.google.com/search?igu=1', 'Browser', 'https://img.icons8.com/color/48/chrome.png')">
            <img src="https://img.icons8.com/color/48/spotify--v1.png" class="tb-icon" onclick="openWeb('https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGvYBM31', 'Spotify', 'https://img.icons8.com/color/48/spotify--v1.png')">
            <img src="https://img.icons8.com/color/48/folder-invoices--v1.png" class="tb-icon">
            
            <div id="active-indicator" class="active-app-container hidden">
                <img id="tb-active-icon" src="" class="tb-icon">
                <div class="active-dot"></div>
            </div>
        </div>

        <div class="tb-right">
            <div class="tray">∧ 🌐 🔊 🔋</div>
            <div class="clock-group">
                <div id="time">12:00 PM</div>
                <div id="date">03/11/2026</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
